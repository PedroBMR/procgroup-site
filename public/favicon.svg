<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <g class="ink" fill="currentColor">
    <!-- engrenagem: 8 dentes ao redor -->
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(0 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(45 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(90 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(135 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(180 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(225 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(270 32 32)"/>
    <rect x="29.2" y="2.5" width="5.6" height="9" rx="1.2" transform="rotate(315 32 32)"/>
